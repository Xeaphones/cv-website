name: Build and Deploy (LWS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LWS_SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.LWS_SSH_PORT }}" "${{ secrets.LWS_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dist/ with rsync
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.LWS_SSH_PORT }}" \
            ./dist/ \
            "${{ secrets.LWS_SSH_USER }}@${{ secrets.LWS_SSH_HOST }}:${{ secrets.LWS_DEPLOY_PATH }}/"
