name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          VITE_SITE_URL: ${{ secrets.SITE_URL }}
          VITE_ANALYTICS_SITE_ID: ${{ secrets.ANALYTICS_SITE_ID }}
          VITE_ANALYTICS_SCRIPT_URL: ${{ secrets.ANALYTICS_SCRIPT_URL }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy dist/ with FTPS
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          set -euo pipefail
          : "${FTP_HOST:?Missing secret FTP_HOST}"
          : "${FTP_PORT:?Missing secret FTP_PORT}"
          : "${FTP_USER:?Missing secret FTP_USER}"
          : "${FTP_PASSWORD:?Missing secret FTP_PASSWORD}"
          : "${FTP_PATH:?Missing secret FTP_PATH}"

          lftp -u "$FTP_USER","$FTP_PASSWORD" "ftp://$FTP_HOST:$FTP_PORT" <<EOF
          set net:timeout 30
          set net:max-retries 2
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          mirror --reverse --delete --verbose ./dist "$FTP_PATH"
          bye
          EOF
